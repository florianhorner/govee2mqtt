repos:
  - repo: local
    hooks:
      - id: fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false
      - id: clippy
        name: cargo clippy
        entry: cargo clippy --all -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
      - id: docs-only-warning
        name: docs-only commit check
        entry: scripts/check-docs-only.sh
        language: script
        always_run: true
        pass_filenames: false
